<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Sakala</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; } </style>
</head>
<body class="hidden" id="bodyAdmin">

  <nav class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="h-10 w-10 bg-teal-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">S</div>
      <h1 class="text-xl font-bold text-gray-800">HR Panel Sakala</h1>
    </div>
    <div class="space-x-2 bg-gray-100 p-1 rounded-lg">
      <button onclick="switchTab('karyawan')" id="btnTabKar" class="px-4 py-2 rounded-md bg-white shadow-sm font-semibold text-teal-700 transition-all">Karyawan</button>
      <button onclick="switchTab('jadwal')" id="btnTabJad" class="px-4 py-2 rounded-md text-gray-500 hover:text-teal-600 font-semibold transition-all">Jadwal</button>
      <button onclick="switchTab('rekap')" id="btnTabRekap" class="px-4 py-2 rounded-md text-gray-500 hover:text-teal-600 font-semibold transition-all">Laporan Rekap</button>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto p-6 mt-4">
    <div id="tabKaryawan" class="hidden"><h2 class="text-xl font-bold">Data Karyawan (Telah dimuat...)</h2></div>
    <div id="tabJadwal" class="hidden"><h2 class="text-xl font-bold">Pengaturan Jadwal (Telah dimuat...)</h2></div>

    <div id="tabRekap" class="">
      <div class="bg-white p-6 rounded-2xl shadow-sm border mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">📅 Filter Laporan Kehadiran</h2>
        <form onsubmit="tarikRekap(event)" class="flex flex-col md:flex-row gap-4 items-end">
          <div class="w-full md:w-1/3">
            <label class="text-sm text-gray-500 font-semibold">Dari Tanggal</label>
            <input type="date" id="tglAwal" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50 focus:ring-2 outline-none">
          </div>
          <div class="w-full md:w-1/3">
            <label class="text-sm text-gray-500 font-semibold">Sampai Tanggal</label>
            <input type="date" id="tglAkhir" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50 focus:ring-2 outline-none">
          </div>
          <div class="w-full md:w-1/3">
            <button type="submit" id="btnTarik" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700 shadow-md">Tampilkan Rekap</button>
          </div>
        </form>
      </div>

      <div class="bg-white p-0 rounded-2xl shadow-sm border overflow-hidden">
        <div class="p-6 border-b"><h2 class="text-lg font-bold text-gray-800">Hasil Rekapitulasi</h2></div>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-gray-50 text-gray-500 text-sm"><tr><th class="p-4">Nama Karyawan</th><th class="p-4 text-center">Total Hadir</th><th class="p-4 text-center">Total Terlambat</th><th class="p-4 text-right">Total Lembur</th></tr></thead>
            <tbody id="tabelRekap" class="divide-y text-gray-700 font-medium">
              <tr><td colspan="4" class="p-8 text-center text-gray-400">Pilih rentang tanggal dan klik Tampilkan Rekap.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx9XwhDjYmI9FBU49p715VdzZ_RhNa5lMsxj3NKl3mjXc5WdeK6fQME2anA7XwmfMqN/exec"; 
    const PIN_ADMIN = "123456";

    let userPin = prompt("Masukkan PIN Admin:");
    if (userPin === PIN_ADMIN) { document.getElementById('bodyAdmin').classList.remove('hidden'); switchTab('rekap'); } 

    function switchTab(tab) {
      document.getElementById('tabKaryawan').classList.add('hidden'); document.getElementById('tabJadwal').classList.add('hidden'); document.getElementById('tabRekap').classList.add('hidden');
      document.getElementById('btnTabKar').className = "px-4 py-2 rounded-md text-gray-500 hover:text-teal-600 font-semibold transition-all";
      document.getElementById('btnTabJad').className = "px-4 py-2 rounded-md text-gray-500 hover:text-teal-600 font-semibold transition-all";
      document.getElementById('btnTabRekap').className = "px-4 py-2 rounded-md text-gray-500 hover:text-teal-600 font-semibold transition-all";
      
      if (tab === 'karyawan') { document.getElementById('tabKaryawan').classList.remove('hidden'); document.getElementById('btnTabKar').classList.add('bg-white', 'text-teal-700', 'shadow-sm'); }
      if (tab === 'jadwal') { document.getElementById('tabJadwal').classList.remove('hidden'); document.getElementById('btnTabJad').classList.add('bg-white', 'text-teal-700', 'shadow-sm'); }
      if (tab === 'rekap') { document.getElementById('tabRekap').classList.remove('hidden'); document.getElementById('btnTabRekap').classList.add('bg-white', 'text-teal-700', 'shadow-sm'); }
    }

    async function tarikRekap(e) {
      e.preventDefault();
      let btn = document.getElementById('btnTarik'); btn.innerText = "Memuat data..."; btn.disabled = true;
      let payload = {
        action: "get_rekap",
        tglAwal: document.getElementById('tglAwal').value,
        tglAkhir: document.getElementById('tglAkhir').value
      };

      try {
        let respon = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        let hasil = await respon.json();
        
        let html = "";
        hasil.data.forEach(r => {
          html += `<tr class="hover:bg-gray-50">
            <td class="p-4 font-bold text-gray-800">${r.nama}</td>
            <td class="p-4 text-center text-teal-600 font-bold">${r.hadir} Hari</td>
            <td class="p-4 text-center text-red-500 font-bold">${r.telat} Kali</td>
            <td class="p-4 text-right text-orange-500 font-bold">${r.lembur}</td>
          </tr>`;
        });
        document.getElementById('tabelRekap').innerHTML = html || '<tr><td colspan="4" class="p-4 text-center">Tidak ada data.</td></tr>';
      } catch(err) { alert("Gagal mengambil data."); }
      btn.innerText = "Tampilkan Rekap"; btn.disabled = false;
    }
  </script>
</body>
</html>
