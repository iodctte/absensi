<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Ikra Dental</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; } </style>
</head>
<body class="hidden" id="bodyAdmin">

  <nav class="bg-white shadow-sm border-b px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
    <div class="flex items-center gap-3">
      <div class="h-10 w-10 bg-teal-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">I</div>
      <h1 class="text-xl font-bold text-gray-800">HR Panel Ikra Dental</h1>
    </div>
    <div class="space-x-1 bg-gray-100 p-1 rounded-lg flex text-sm">
      <button onclick="switchTab('karyawan')" id="btnTabKar" class="px-4 py-2 rounded-md bg-white shadow-sm font-semibold text-teal-700">Karyawan</button>
      <button onclick="switchTab('jadwal')" id="btnTabJad" class="px-4 py-2 rounded-md text-gray-500 hover:text-teal-600 font-semibold">Jadwal</button>
      <button onclick="switchTab('rekap')" id="btnTabRekap" class="px-4 py-2 rounded-md text-gray-500 hover:text-teal-600 font-semibold">Rekap</button>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto p-4 md:p-6 mt-2">
    <div id="loadingStatus" class="hidden bg-blue-100 text-blue-700 p-3 rounded-lg mb-4 text-center font-semibold animate-pulse">Memuat...</div>

    <div id="tabKaryawan" class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="md:col-span-1 bg-white p-6 rounded-2xl shadow-sm border h-fit">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">➕ Tambah Karyawan</h2>
        <form onsubmit="tambahKaryawan(event)" class="space-y-4">
          <div><label class="text-sm text-gray-500 font-semibold">Nama Lengkap</label><input type="text" id="inputNama" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50 focus:ring-teal-500 outline-none"></div>
          <div><label class="text-sm text-gray-500 font-semibold">Username Login</label><input type="text" id="inputUser" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50 focus:ring-teal-500 outline-none"></div>
          <div><label class="text-sm text-gray-500 font-semibold">Password Login</label><input type="text" id="inputPass" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50 focus:ring-teal-500 outline-none"></div>
          <button type="submit" class="w-full bg-teal-600 text-white p-3 rounded-xl font-bold hover:bg-teal-700">Simpan</button>
        </form>
      </div>
      <div class="md:col-span-2 bg-white p-0 rounded-2xl shadow-sm border overflow-hidden">
        <div class="p-6 border-b"><h2 class="text-lg font-bold text-gray-800">Daftar Akun</h2></div>
        <div class="overflow-x-auto">
          <table class="w-full text-left whitespace-nowrap">
            <thead class="bg-gray-50 text-gray-500 text-sm"><tr><th class="p-4">Nama</th><th class="p-4">Username</th><th class="p-4">Password</th><th class="p-4 text-right">Aksi</th></tr></thead>
            <tbody id="tabelKaryawan" class="divide-y text-gray-700 font-medium"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tabJadwal" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="md:col-span-1 bg-white p-6 rounded-2xl shadow-sm border h-fit">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">⏳ Set Jadwal Shift</h2>
        <form onsubmit="tambahJadwalBulk(event)" class="space-y-4">
          <div>
            <label class="text-sm text-gray-500 font-semibold mb-1 block">Jadwal Ini Untuk Siapa?</label>
            <select id="inputTargetKar" class="w-full p-3 border rounded-xl bg-gray-50 outline-none font-bold text-teal-700">
              <option value="Semua">Semua Karyawan (Umum)</option>
              </select>
          </div>

          <div>
            <label class="text-sm text-gray-500 font-semibold mb-2 block">Pilih Hari</label>
            <div class="grid grid-cols-2 gap-2 text-sm text-gray-700">
              <label class="flex items-center gap-2 bg-gray-50 p-2 border rounded cursor-pointer"><input type="checkbox" value="Senin" class="hari-chk w-4 h-4 text-teal-600"> Senin</label>
              <label class="flex items-center gap-2 bg-gray-50 p-2 border rounded cursor-pointer"><input type="checkbox" value="Selasa" class="hari-chk w-4 h-4 text-teal-600"> Selasa</label>
              <label class="flex items-center gap-2 bg-gray-50 p-2 border rounded cursor-pointer"><input type="checkbox" value="Rabu" class="hari-chk w-4 h-4 text-teal-600"> Rabu</label>
              <label class="flex items-center gap-2 bg-gray-50 p-2 border rounded cursor-pointer"><input type="checkbox" value="Kamis" class="hari-chk w-4 h-4 text-teal-600"> Kamis</label>
              <label class="flex items-center gap-2 bg-gray-50 p-2 border rounded cursor-pointer"><input type="checkbox" value="Jumat" class="hari-chk w-4 h-4 text-teal-600"> Jumat</label>
              <label class="flex items-center gap-2 bg-gray-50 p-2 border rounded cursor-pointer"><input type="checkbox" value="Sabtu" class="hari-chk w-4 h-4 text-teal-600"> Sabtu</label>
              <label class="flex items-center gap-2 bg-gray-50 p-2 border rounded cursor-pointer"><input type="checkbox" value="Minggu" class="hari-chk w-4 h-4 text-teal-600"> Minggu</label>
            </div>
          </div>
          <div class="border-t pt-4">
            <label class="text-sm text-gray-500 font-semibold mb-1 block">Tgl Spesifik (Opsional)</label>
            <input type="text" id="inputTglSpesifik" placeholder="Contoh: 30/03/2026" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
          </div>
          <div class="grid grid-cols-2 gap-4 border-t pt-4">
            <div><label class="text-xs text-gray-500 font-semibold">Masuk</label><input type="time" id="inputJamMasuk" required class="w-full mt-1 p-2 border rounded-lg bg-gray-50"></div>
            <div><label class="text-xs text-gray-500 font-semibold">Pulang</label><input type="time" id="inputJamPulang" required class="w-full mt-1 p-2 border rounded-lg bg-gray-50"></div>
          </div>
          <div><label class="text-xs text-gray-500 font-semibold">Toleransi Telat (Menit)</label><input type="number" id="inputToleransi" value="15" required class="w-full mt-1 p-2 border rounded-lg bg-gray-50"></div>
          <button type="submit" class="w-full bg-teal-600 text-white p-3 rounded-xl font-bold hover:bg-teal-700">Simpan Jadwal</button>
        </form>
      </div>

      <div class="md:col-span-2 bg-white p-0 rounded-2xl shadow-sm border overflow-hidden">
        <div class="p-6 border-b"><h2 class="text-lg font-bold text-gray-800">Daftar Jadwal Aktif</h2></div>
        <div class="overflow-x-auto">
          <table class="w-full text-left whitespace-nowrap">
            <thead class="bg-gray-50 text-gray-500 text-sm"><tr><th class="p-4">Hari / Tgl</th><th class="p-4">Shift</th><th class="p-4">Target Karyawan</th><th class="p-4 text-right">Aksi</th></tr></thead>
            <tbody id="tabelJadwal" class="divide-y text-gray-700 font-medium"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tabRekap" class="hidden">
      <div class="bg-white p-6 rounded-2xl shadow-sm border mb-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">📅 Filter Laporan Kehadiran</h2>
        <form onsubmit="tarikRekap(event)" class="flex flex-col md:flex-row gap-4 items-end">
          <div class="w-full md:w-1/3"><label class="text-sm text-gray-500 font-semibold">Dari Tgl</label><input type="date" id="tglAwal" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50"></div>
          <div class="w-full md:w-1/3"><label class="text-sm text-gray-500 font-semibold">Sampai Tgl</label><input type="date" id="tglAkhir" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50"></div>
          <div class="w-full md:w-1/3"><button type="submit" id="btnTarik" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-700">Tampilkan Rekap</button></div>
        </form>
      </div>
      <div class="bg-white p-0 rounded-2xl shadow-sm border overflow-hidden">
        <table class="w-full text-left whitespace-nowrap">
          <thead class="bg-gray-50 text-gray-500 text-sm"><tr><th class="p-4">Nama</th><th class="p-4 text-center">Hadir</th><th class="p-4 text-center">Terlambat</th><th class="p-4 text-right">Lembur</th></tr></thead>
          <tbody id="tabelRekap" class="divide-y text-gray-700 font-medium"><tr><td colspan="4" class="p-8 text-center text-gray-400">Pilih tanggal untuk melihat rekap.</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx9XwhDjYmI9FBU49p715VdzZ_RhNa5lMsxj3NKl3mjXc5WdeK6fQME2anA7XwmfMqN/exec"; 
    const PIN_ADMIN = "123456";

    let userPin = prompt("Masukkan PIN Admin HR:");
    if (userPin === PIN_ADMIN) { document.getElementById('bodyAdmin').classList.remove('hidden'); loadData(); } 
    else { document.body.innerHTML = "<h2 class='text-center mt-20 text-red-500 font-bold'>Akses Ditolak</h2>"; document.body.classList.remove('hidden'); }

    function switchTab(tab) {
      document.getElementById('tabKaryawan').classList.add('hidden'); document.getElementById('tabJadwal').classList.add('hidden'); document.getElementById('tabRekap').classList.add('hidden');
      document.getElementById('btnTabKar').className = "px-4 py-2 rounded-md text-gray-500 hover:text-teal-600 font-semibold";
      document.getElementById('btnTabJad').className = "px-4 py-2 rounded-md text-gray-500 hover:text-teal-600 font-semibold";
      document.getElementById('btnTabRekap').className = "px-4 py-2 rounded-md text-gray-500 hover:text-teal-600 font-semibold";
      if (tab === 'karyawan') { document.getElementById('tabKaryawan').classList.remove('hidden'); document.getElementById('btnTabKar').classList.add('bg-white', 'text-teal-700', 'shadow-sm'); }
      if (tab === 'jadwal') { document.getElementById('tabJadwal').classList.remove('hidden'); document.getElementById('btnTabJad').classList.add('bg-white', 'text-teal-700', 'shadow-sm'); }
      if (tab === 'rekap') { document.getElementById('tabRekap').classList.remove('hidden'); document.getElementById('btnTabRekap').classList.add('bg-white', 'text-teal-700', 'shadow-sm'); }
    }

    async function loadData() {
      document.getElementById('loadingStatus').classList.remove('hidden');
      try {
        let response = await fetch(GAS_URL + "?action=get_data"); let result = await response.json();
        
        // Render Karyawan & Isi Dropdown Target
        let htmlKaryawan = "";
        let dropdownTarget = `<option value="Semua">Semua Karyawan (Umum)</option>`;
        if(result.karyawan && result.karyawan.length > 0) {
          result.karyawan.forEach(row => {
            htmlKaryawan += `<tr class="hover:bg-gray-50"><td class="p-4 flex items-center gap-3"><div class="h-8 w-8 rounded-full bg-teal-100 text-teal-600 flex items-center justify-center font-bold">${row[0].charAt(0)}</div>${row[0]}</td><td class="p-4 text-gray-500">@${row[1]}</td><td class="p-4"><span class="bg-gray-200 text-xs px-2 py-1 rounded">${row[2]}</span></td><td class="p-4 text-right"><button onclick="hapusKaryawan('${row[0]}')" class="text-red-500 font-bold bg-red-50 px-3 py-1 rounded-lg">Hapus</button></td></tr>`;
            dropdownTarget += `<option value="${row[0]}">Khusus: ${row[0]}</option>`;
          });
        }
        document.getElementById('tabelKaryawan').innerHTML = htmlKaryawan;
        document.getElementById('inputTargetKar').innerHTML = dropdownTarget; // Update isi dropdown

        // Render Jadwal
        let htmlJadwal = "";
        if(result.jadwal && result.jadwal.length > 0) {
          result.jadwal.forEach(row => {
            // row[4] adalah target_karyawan, row[5] adalah ID jadwal
            let badge = row[4] === 'Semua' ? `<span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded font-bold">Semua Umum</span>` : `<span class="bg-orange-100 text-orange-700 text-xs px-2 py-1 rounded font-bold">Khusus ${row[4]}</span>`;
            htmlJadwal += `<tr class="hover:bg-gray-50"><td class="p-4 font-bold text-gray-800">${row[0]}</td><td class="p-4">${row[1]} - ${row[3]}</td><td class="p-4">${badge}</td><td class="p-4 text-right"><button onclick="hapusJadwal('${row[5]}', '${row[0]}')" class="text-red-500 font-bold bg-red-50 px-3 py-1 rounded-lg">Hapus</button></td></tr>`;
          });
        }
        document.getElementById('tabelJadwal').innerHTML = htmlJadwal;
        document.getElementById('loadingStatus').classList.add('hidden');
      } catch (error) { document.getElementById('loadingStatus').innerText = "Gagal memuat."; }
    }

    async function kirimDataPOST(payload) {
      document.getElementById('loadingStatus').classList.remove('hidden'); document.getElementById('loadingStatus').innerText = "Menyimpan...";
      try {
        let response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        let result = await response.json();
        if (result.status === "success") loadData(); else alert("Error: " + result.pesan);
      } catch (error) { alert("Gagal koneksi."); document.getElementById('loadingStatus').classList.add('hidden'); }
    }

    function tambahKaryawan(e) { e.preventDefault(); kirimDataPOST({ action: "tambah_karyawan", nama: document.getElementById('inputNama').value, username: document.getElementById('inputUser').value, password: document.getElementById('inputPass').value }); e.target.reset(); }

    function tambahJadwalBulk(e) {
      e.preventDefault();
      let hariTerpilih = Array.from(document.querySelectorAll('.hari-chk:checked')).map(cb => cb.value);
      let tglSpesifik = document.getElementById('inputTglSpesifik').value;
      if (tglSpesifik) hariTerpilih.push(tglSpesifik);
      if (hariTerpilih.length === 0) return alert("Pilih minimal 1 hari!");

      let jmMasuk = document.getElementById('inputJamMasuk').value; if(jmMasuk.length > 5) jmMasuk = jmMasuk.substring(0, 5);
      let jmPulang = document.getElementById('inputJamPulang').value; if(jmPulang.length > 5) jmPulang = jmPulang.substring(0, 5);
      let targetKar = document.getElementById('inputTargetKar').value;

      kirimDataPOST({ action: "tambah_jadwal_bulk", hariArray: hariTerpilih, jamMasuk: jmMasuk, toleransi: document.getElementById('inputToleransi').value, jamPulang: jmPulang, targetKaryawan: targetKar });
      document.querySelectorAll('.hari-chk').forEach(cb => cb.checked = false); document.getElementById('inputTglSpesifik').value = "";
    }

    function hapusKaryawan(nama) { if(confirm(`Hapus Karyawan: ${nama}?`)) kirimDataPOST({ action: 'hapus_karyawan', nama: nama }); }
    // UPDATE: Hapus jadwal sekarang mengirimkan ID tabel Supabase
    function hapusJadwal(id, namaTampil) { if(confirm(`Hapus jadwal ${namaTampil}?`)) kirimDataPOST({ action: 'hapus_jadwal', idJadwal: id }); }

    async function tarikRekap(e) {
      e.preventDefault(); let btn = document.getElementById('btnTarik'); btn.innerText = "Memuat..."; btn.disabled = true;
      let payload = { action: "get_rekap", tglAwal: document.getElementById('tglAwal').value, tglAkhir: document.getElementById('tglAkhir').value };
      try {
        let respon = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) }); let hasil = await respon.json();
        let html = "";
        if(hasil.data && hasil.data.length > 0) {
          hasil.data.forEach(r => { html += `<tr class="hover:bg-gray-50"><td class="p-4 font-bold text-gray-800">${r.nama}</td><td class="p-4 text-center text-teal-600 font-bold">${r.hadir} Hari</td><td class="p-4 text-center text-red-500 font-bold">${r.telat} Kali</td><td class="p-4 text-right text-orange-500 font-bold">${r.lembur}</td></tr>`; });
        }
        document.getElementById('tabelRekap').innerHTML = html || '<tr><td colspan="4" class="p-4 text-center">Tidak ada data.</td></tr>';
      } catch(err) { alert("Gagal mengambil data."); }
      btn.innerText = "Tampilkan Rekap"; btn.disabled = false;
    }
  </script>
</body>
</html>
