<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard IODC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass-card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
  </style>
</head>
<body class="bg-gradient-to-br from-teal-500 to-blue-600 min-h-screen flex items-center justify-center p-4">

  <div id="layarLogin" class="hidden glass-card p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center transform transition-all">
    <div class="mb-8">
      <div class="h-20 w-20 bg-white text-teal-600 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
      </div>
      <h2 class="text-3xl font-bold text-gray-800">Klinik Sakala</h2>
      <p class="text-sm text-gray-600 mt-2 font-medium">Silakan masuk ke akun Anda</p>
    </div>
    
    <div class="space-y-4 mb-8">
      <input type="text" id="inUsername" placeholder="Username" class="w-full p-4 border-0 rounded-2xl bg-white shadow-inner focus:outline-none focus:ring-2 focus:ring-teal-500 font-medium text-gray-700 placeholder-gray-400">
      <input type="password" id="inPassword" placeholder="Password" class="w-full p-4 border-0 rounded-2xl bg-white shadow-inner focus:outline-none focus:ring-2 focus:ring-teal-500 font-medium text-gray-700 placeholder-gray-400">
    </div>

    <button id="btnLogin" onclick="prosesLogin()" class="w-full bg-teal-600 text-white p-4 rounded-2xl font-bold text-lg hover:bg-teal-700 active:transform active:scale-95 transition-all shadow-lg flex justify-center items-center gap-2">
      Masuk
    </button>
  </div>

  <div id="layarDashboard" class="hidden w-full max-w-sm flex flex-col gap-4">
    <div class="glass-card p-6 rounded-3xl shadow-xl text-center">
      <h1 class="text-2xl font-bold text-gray-800 mt-1" id="teksSapaan">Halo, Nama!</h1>
      <div class="mt-4 p-4 bg-white/60 rounded-2xl border border-white/60">
        <p id="teksTanggal" class="text-sm font-bold text-teal-700 uppercase tracking-wide">Hari, Tgl Bulan Tahun</p>
        <div id="teksJam" class="text-5xl font-bold text-gray-800 tracking-tighter mt-1 drop-shadow-sm">00:00</div>
        <p class="text-xs text-gray-500 mt-1 font-medium">Waktu Indonesia Timur</p>
      </div>
    </div>

    <div class="glass-card p-6 rounded-3xl shadow-xl flex flex-col items-center">
      <div id="badgeStatus" class="px-4 py-1 rounded-full text-sm font-bold bg-gray-200 text-gray-600 mb-6 shadow-inner">
        Status: Belum Absen
      </div>

      <button id="btnClockIn" onclick="bukaKamera('Masuk')" class="w-full bg-gradient-to-r from-teal-500 to-teal-400 text-white p-4 rounded-2xl font-bold text-lg active:scale-95 transition-all mb-3 shadow-md flex justify-center items-center gap-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg> Clock In
      </button>

      <button id="btnClockOut" onclick="bukaKamera('Pulang')" class="w-full hidden bg-gradient-to-r from-red-500 to-orange-400 text-white p-4 rounded-2xl font-bold text-lg active:scale-95 transition-all mb-3 shadow-md flex justify-center items-center gap-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg> Clock Out
      </button>

      <div id="pesanSelesai" class="hidden w-full p-4 bg-green-100 text-green-700 rounded-2xl font-bold text-center border border-green-200">
        🎉 Shift hari ini selesai. Selamat beristirahat!
      </div>
      
      <p id="statusSync" class="mt-4 text-xs font-medium text-gray-700 opacity-80"></p>

      <button onclick="prosesLogout()" class="mt-6 text-xs font-bold text-red-500 hover:text-red-700 underline">Keluar Akun (Logout)</button>
    </div>
  </div>

  <div id="overlayKamera" class="hidden fixed inset-0 bg-black z-40 flex flex-col">
    <div class="p-4 flex justify-between items-center bg-black/50 absolute top-0 w-full z-50">
      <h3 class="text-white font-bold text-lg" id="judulKamera">Ambil Foto</h3>
      <button onclick="tutupKamera()" class="text-white bg-white/20 p-2 rounded-full"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
    </div>
    <div class="flex-1 relative bg-gray-900 flex items-center justify-center">
      <p id="kameraLoading" class="text-white absolute">Menyiapkan kamera...</p>
      <video id="video" class="w-full h-full object-cover" autoplay playsinline muted></video>
      <canvas id="canvas" class="hidden"></canvas>
    </div>
    <div class="bg-black pb-10 pt-6 px-6 flex justify-center">
      <button onclick="eksekusiAbsen()" class="w-20 h-20 bg-white rounded-full border-4 border-gray-300 active:bg-gray-200 active:scale-90 transition-all shadow-[0_0_0_4px_black_inset]"></button>
    </div>
  </div>

  <div id="modalKu" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 px-4">
    <div class="bg-white rounded-3xl p-6 w-full max-w-xs text-center shadow-2xl">
      <div id="ikonModal" class="mx-auto flex items-center justify-center h-16 w-16 rounded-full mb-4"></div>
      <h3 class="text-xl font-bold text-gray-900" id="judulModal">Status</h3>
      <p class="mt-2 text-sm text-gray-500" id="pesanModal">Pesan</p>
      <button onclick="tutupModal()" class="mt-6 w-full rounded-xl bg-teal-600 px-4 py-3 text-white font-bold active:scale-95 transition-all">Tutup</button>
    </div>
  </div>

  <script>
    // MASUKKAN URL WEB APP GAS ANDA DI SINI
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwmKy7XBr6_w9axtnoxoTb9qP27wP1SK7gC4_ixDfxRlmgkgcwa4QJuSBpYEEWr8XdB/exec"; 

    // --- State & Variabel ---
    let myName = localStorage.getItem('sakala_name');
    let deviceID = localStorage.getItem('sakala_deviceID');
    if (!deviceID) { deviceID = 'DEV-' + Math.random().toString(36).substr(2, 9); localStorage.setItem('sakala_deviceID', deviceID); }
    
    let tipeAbsenAktif = "";
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let streamAktif = null;

    window.onload = () => {
      if (myName) {
        document.getElementById('layarDashboard').classList.remove('hidden');
        document.getElementById('teksSapaan').innerText = `Halo, ${myName.split(' ')[0]}!`;
        jalankanJam();
        cekLogikaHarian();
        prosesAntrian();
      } else {
        document.getElementById('layarLogin').classList.remove('hidden');
      }
    };

    // --- FUNGSI LOGIN & LOGOUT ---
    async function prosesLogin() {
      let user = document.getElementById('inUsername').value;
      let pass = document.getElementById('inPassword').value;
      let btn = document.getElementById('btnLogin');

      if (!user || !pass) return bukaModal("Perhatian", "Isi Username dan Password!", false);

      btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Memeriksa...`;
      btn.disabled = true;

      try {
        let respon = await fetch(GAS_URL, {
          method: 'POST',
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "login", username: user, password: pass })
        });
        
        let hasil = JSON.parse(await respon.text());
        
        if (hasil.status === "success") {
          localStorage.setItem('sakala_name', hasil.nama);
          location.reload(); // Otomatis masuk dashboard
        } else {
          bukaModal("Login Gagal", hasil.pesan, false);
          btn.innerHTML = "Masuk"; btn.disabled = false;
        }
      } catch (error) {
        bukaModal("Error Jaringan", "Gagal terhubung ke server Google.", false);
        btn.innerHTML = "Masuk"; btn.disabled = false;
      }
    }

    function prosesLogout() {
      if(confirm("Yakin ingin keluar akun?")) {
        localStorage.removeItem('sakala_name');
        location.reload();
      }
    }

    // --- JAM & TANGGAL (Zona WIT) ---
    function jalankanJam() {
      setInterval(() => {
        let now = new Date();
        document.getElementById('teksJam').innerText = now.toLocaleTimeString("id-ID", { timeZone: "Asia/Jayapura", hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).replace(/\./g, ':');
        document.getElementById('teksTanggal').innerText = now.toLocaleDateString("id-ID", { timeZone: "Asia/Jayapura", weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' });
      }, 1000);
    }

    // --- LOGIKA TOMBOL HARIAN ---
    function cekLogikaHarian() {
      let now = new Date().toLocaleDateString("id-ID", {timeZone: "Asia/Jayapura"}); 
      let lastDate = localStorage.getItem('sakala_last_date');
      let statusHarian = localStorage.getItem('sakala_status_harian'); 

      if (lastDate !== now) { localStorage.setItem('sakala_last_date', now); localStorage.removeItem('sakala_status_harian'); statusHarian = null; }

      const btnIn = document.getElementById('btnClockIn'), btnOut = document.getElementById('btnClockOut'), msgSelesai = document.getElementById('pesanSelesai'), badge = document.getElementById('badgeStatus');
      btnIn.classList.add('hidden'); btnOut.classList.add('hidden'); msgSelesai.classList.add('hidden');

      if (!statusHarian) { btnIn.classList.remove('hidden'); badge.innerText = "Status: Belum Absen"; badge.className = "px-4 py-1 rounded-full text-sm font-bold bg-gray-200 text-gray-600 mb-6"; } 
      else if (statusHarian === "masuk") { btnOut.classList.remove('hidden'); badge.innerText = "Status: Sedang Shift"; badge.className = "px-4 py-1 rounded-full text-sm font-bold bg-teal-100 text-teal-700 mb-6 border border-teal-300"; } 
      else if (statusHarian === "pulang") { msgSelesai.classList.remove('hidden'); badge.innerText = "Status: Selesai Shift"; badge.className = "px-4 py-1 rounded-full text-sm font-bold bg-green-100 text-green-700 mb-6 border border-green-300"; }
    }

    // --- KAMERA & FOTO ---
    function bukaKamera(tipe) {
      tipeAbsenAktif = tipe; document.getElementById('judulKamera').innerText = `Clock ${tipe === 'Masuk' ? 'In' : 'Out'} - Selfie`;
      document.getElementById('overlayKamera').classList.remove('hidden'); document.getElementById('kameraLoading').style.display = "block";
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
        .then(stream => { streamAktif = stream; video.srcObject = stream; document.getElementById('kameraLoading').style.display = "none"; })
        .catch(err => { tutupKamera(); bukaModal("Kamera Gagal", "Izinkan akses kamera di Safari Anda.", false); });
    }
    function tutupKamera() { if (streamAktif) { streamAktif.getTracks().forEach(track => track.stop()); streamAktif = null; } document.getElementById('overlayKamera').classList.add('hidden'); }

    // --- KIRIM DATA ABSEN ---
    function eksekusiAbsen() {
      canvas.width = video.videoWidth || 480; canvas.height = video.videoHeight || 640;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      let wktLokal = new Date().toLocaleString("id-ID", {timeZone: "Asia/Jayapura"}); 
      ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
      ctx.fillStyle = "white"; ctx.font = "bold 16px Inter, sans-serif"; ctx.textAlign = "center";
      ctx.fillText(`Klinik Sakala | ${myName} | ${tipeAbsenAktif}`, canvas.width / 2, canvas.height - 30);
      ctx.font = "14px Inter, sans-serif"; ctx.fillText(wktLokal + " WIT", canvas.width / 2, canvas.height - 12);

      const payload = { action: "absen", idUnik: Date.now().toString(), nama: myName, tipe: tipeAbsenAktif, foto: canvas.toDataURL('image/jpeg', 0.8), deviceID: deviceID };

      let antrian = JSON.parse(localStorage.getItem('antrianSakala')) || [];
      antrian.push(payload); localStorage.setItem('antrianSakala', JSON.stringify(antrian));
      localStorage.setItem('sakala_status_harian', tipeAbsenAktif === 'Masuk' ? 'masuk' : 'pulang');

      tutupKamera(); cekLogikaHarian(); 
      bukaModal("Berhasil!", `Data ${tipeAbsenAktif} tersimpan di HP. Mengirim ke server...`, true);
      prosesAntrian();
    }

    // --- BACKGROUND SYNC ---
    window.addEventListener('online', prosesAntrian);
    async function prosesAntrian() {
      const syncTeks = document.getElementById('statusSync');
      if (!navigator.onLine) { syncTeks.innerText = "Sinyal offline. Data aman di HP."; return; }
      let antrian = JSON.parse(localStorage.getItem('antrianSakala')) || [];
      if (antrian.length === 0) { syncTeks.innerText = "☁️ Terhubung & Sinkron"; return; }

      syncTeks.innerText = `⏳ Menyinkronkan data ke cloud...`;
      try {
        let respon = await fetch(GAS_URL, { method: 'POST', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(antrian[0]) });
        let hasil = JSON.parse(await respon.text());
        if (hasil.status === "success" || hasil.status === "error") {
          antrian.shift(); localStorage.setItem('antrianSakala', JSON.stringify(antrian));
          syncTeks.innerText = `✅ Laporan: ${hasil.pesan}`; 
          if(antrian.length > 0) prosesAntrian(); 
        }
      } catch (error) { syncTeks.innerText = "⚠️ Gangguan koneksi. Akan diulang otomatis."; }
    }

    // --- MODAL ---
    function bukaModal(judul, pesan, sukses) {
      document.getElementById('judulModal').innerText = judul; document.getElementById('pesanModal').innerText = pesan;
      let ikon = document.getElementById('ikonModal');
      ikon.className = sukses ? "mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-4 text-green-600" : "mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-4 text-red-600";
      ikon.innerHTML = sukses ? '<svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>' : '<svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>';
      document.getElementById('modalKu').classList.remove('hidden');
    }
    function tutupModal() { document.getElementById('modalKu').classList.add('hidden'); }
  </script>
</body>
</html>
